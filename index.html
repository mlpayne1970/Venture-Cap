<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Venture Capital - iPad Edition</title>
  <style>
    /* ====== CSS VARIABLES FOR THEMING ====== */
    :root {
      /* Modern Theme (Default for iPad) */
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e9ecef;
      --text-primary: #212529;
      --text-secondary: #495057;
      --text-muted: #6c757d;
      --accent-primary: #0d6efd;
      --accent-secondary: #198754;
      --accent-warning: #fd7e14;
      --accent-danger: #dc3545;
      --border-color: #dee2e6;
      --shadow-color: rgba(0,0,0,0.1);
      --panel-bg: #ffffff;
      --cell-bg: #f8f9fa;
      --cell-border: #dee2e6;
      --neutral-tile: linear-gradient(135deg, #6c757d 0%, #495057 100%);
      --header-bg: transparent;
      --modal-overlay: rgba(0,0,0,0.5);
    }

    /* Dark Theme */
    [data-theme="dark"] {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --text-primary: #eaeaea;
      --text-secondary: #b8b8b8;
      --text-muted: #888888;
      --accent-primary: #4fc3f7;
      --accent-secondary: #81c784;
      --accent-warning: #ffb74d;
      --accent-danger: #e57373;
      --border-color: #3a3a5c;
      --shadow-color: rgba(0,0,0,0.4);
      --panel-bg: #16213e;
      --cell-bg: #1a1a2e;
      --cell-border: #3a3a5c;
      --neutral-tile: linear-gradient(135deg, #4a4a6a 0%, #3a3a5c 100%);
      --header-bg: #0f3460;
      --modal-overlay: rgba(0,0,0,0.7);
    }

    /* Retro Theme */
    [data-theme="retro"] {
      --bg-primary: #c4cfa1;
      --bg-secondary: #d4deb2;
      --bg-tertiary: #e4eec2;
      --text-primary: #2d3319;
      --text-secondary: #4a5528;
      --text-muted: #6b7a3a;
      --accent-primary: #8b4513;
      --accent-secondary: #228b22;
      --accent-warning: #daa520;
      --accent-danger: #b22222;
      --border-color: #9aab71;
      --shadow-color: rgba(45,51,25,0.2);
      --panel-bg: #d4deb2;
      --cell-bg: #e4eec2;
      --cell-border: #9aab71;
      --neutral-tile: linear-gradient(135deg, #6b7a3a 0%, #4a5528 100%);
      --header-bg: #9aab71;
      --modal-overlay: rgba(45,51,25,0.6);
    }

    /* Ocean Theme */
    [data-theme="ocean"] {
      --bg-primary: #e0f7fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #b2ebf2;
      --text-primary: #004d5a;
      --text-secondary: #00838f;
      --text-muted: #4db6c4;
      --accent-primary: #0097a7;
      --accent-secondary: #26a69a;
      --accent-warning: #ff8a65;
      --accent-danger: #ef5350;
      --border-color: #80deea;
      --shadow-color: rgba(0,77,90,0.15);
      --panel-bg: #ffffff;
      --cell-bg: #e0f7fa;
      --cell-border: #80deea;
      --neutral-tile: linear-gradient(135deg, #00838f 0%, #006978 100%);
      --header-bg: #b2ebf2;
      --modal-overlay: rgba(0,77,90,0.5);
    }

    /* Sunset Theme */
    [data-theme="sunset"] {
      --bg-primary: #fff5f5;
      --bg-secondary: #ffffff;
      --bg-tertiary: #ffe4e1;
      --text-primary: #4a1a1a;
      --text-secondary: #8b4545;
      --text-muted: #bc7070;
      --accent-primary: #e65100;
      --accent-secondary: #ff7043;
      --accent-warning: #ffa726;
      --accent-danger: #d32f2f;
      --border-color: #ffccbc;
      --shadow-color: rgba(74,26,26,0.15);
      --panel-bg: #ffffff;
      --cell-bg: #fff5f5;
      --cell-border: #ffccbc;
      --neutral-tile: linear-gradient(135deg, #e65100 0%, #bf360c 100%);
      --header-bg: #ffe4e1;
      --modal-overlay: rgba(74,26,26,0.5);
    }

    /* High Contrast Theme */
    [data-theme="contrast"] {
      --bg-primary: #000000;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #333333;
      --text-primary: #ffffff;
      --text-secondary: #ffff00;
      --text-muted: #cccccc;
      --accent-primary: #00ffff;
      --accent-secondary: #00ff00;
      --accent-warning: #ffff00;
      --accent-danger: #ff0000;
      --border-color: #ffffff;
      --shadow-color: rgba(255,255,255,0.2);
      --panel-bg: #1a1a1a;
      --cell-bg: #333333;
      --cell-border: #ffffff;
      --neutral-tile: linear-gradient(135deg, #666666 0%, #444444 100%);
      --header-bg: #333333;
      --modal-overlay: rgba(0,0,0,0.8);
    }

    /* ====== BASE STYLES ====== */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      transition: background 0.3s, color 0.3s;
      /* Support for devices with notches */
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }

    html {
      scroll-behavior: smooth;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html {
      scroll-behavior: smooth;
    }

    * {
      -webkit-font-smoothing: antialiated;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Mobile help banner */
    .mobile-banner {
      display: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      text-align: center;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: relative;
      z-index: 100;
    }

    .mobile-banner strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .mobile-banner .close-banner {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    @media screen and (max-width: 768px) {
      .mobile-banner {
        display: block;
      }
    }

    /* rest of original file... */

  </style>
</head>
<body>
  <!-- original body content restored -->
</body>
</html>
