<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Venture Capital - iPad Edition</title>
  <style>
    /* ====== CSS VARIABLES FOR THEMING ====== */
    :root {
      /* Modern Theme (Default for iPad) */
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e9ecef;
      --text-primary: #212529;
      --text-secondary: #495057;
      --text-muted: #6c757d;
      --accent-primary: #0d6efd;
      --accent-secondary: #198754;
      --accent-warning: #fd7e14;
      --accent-danger: #dc3545;
      --border-color: #dee2e6;
      --shadow-color: rgba(0,0,0,0.1);
      --panel-bg: #ffffff;
      --cell-bg: #f8f9fa;
      --cell-border: #dee2e6;
      --neutral-tile: linear-gradient(135deg, #6c757d 0%, #495057 100%);
      --header-bg: transparent;
      --modal-overlay: rgba(0,0,0,0.5);

      /* Component-level variables (to avoid hard-coded colors that don't follow theme) */
      --banner-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --banner-text: #ffffff;
      --banner-close-bg: rgba(255,255,255,0.2);

      --neutral-tile-bg: linear-gradient(135deg, #757575 0%, #616161 100%);
      --neutral-tile-text: #ffffff;
      --neutral-tile-border: #424242;

      --cell-chain-color: #ffffff;

      --preview-legal: #4caf50;
      --preview-illegal: #ff4444;
      --preview-merger: #ff9800;
      --preview-new-chain: #2196f3;

      --player-tile-ring: #4caf50;
      --player-tile-ring-glow: rgba(76,175,80,0.6);
      --player-tile-ring-hover: #66bb6a;
      --player-tile-glow-hover: rgba(76,175,80,0.8);

      --stock-button-border: #cccccc;
      --stock-button-bg: #ffffff;
      --stock-button-hover-bg: #e3f2fd;
      --stock-button-hover-border: #2196f3;

      --turn-bg: #ffffff;
      --turn-text: #333333;
      --turn-ai-bg: #1565c0;
      --turn-ai-text: #ffffff;
      --game-status-text: #666666;

      --unplayable-bg: rgba(220, 53, 69, 0.1);

      --winner-gold: #ffd700;
      --winner-silver: #c0c0c0;
      --winner-bronze: #cd7f32;
      --score-rank1-bg: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      --score-rank2-bg: linear-gradient(135deg, #c0c0c0 0%, #d3d3d3 100%);
    }

    /* Dark Theme */
    [data-theme="dark"] {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --text-primary: #eaeaea;
      --text-secondary: #b8b8b8;
      --text-muted: #888888;
      --accent-primary: #4fc3f7;
      --accent-secondary: #81c784;
      --accent-warning: #ffb74d;
      --accent-danger: #e57373;
      --border-color: #3a3a5c;
      --shadow-color: rgba(0,0,0,0.4);
      --panel-bg: #16213e;
      --cell-bg: #1a1a2e;
      --cell-border: #3a3a5c;
      --neutral-tile: linear-gradient(135deg, #4a4a6a 0%, #3a3a5c 100%);
      --header-bg: #0f3460;
      --modal-overlay: rgba(0,0,0,0.7);

      /* dark overrides for component vars */
      --banner-bg: linear-gradient(135deg, #334155 0%, #1e293b 100%);
      --banner-text: #ffffff;
      --banner-close-bg: rgba(255,255,255,0.12);

      --neutral-tile-bg: linear-gradient(135deg,#4a4a6a 0%, #3a3a5c 100%);
      --neutral-tile-text: #ffffff;
      --neutral-tile-border: #2f3246;

      --cell-chain-color: #ffffff;

      --preview-legal: #73d13d;
      --preview-illegal: #ff6b6b;
      --preview-merger: #ffb74d;
      --preview-new-chain: #4fc3f7;

      --player-tile-ring: #4fc3f7;
      --player-tile-ring-glow: rgba(79,195,247,0.35);
      --player-tile-ring-hover: #66bbf0;
      --player-tile-glow-hover: rgba(79,195,247,0.6);

      --stock-button-border: #2b3a56;
      --stock-button-bg: #16213e;
      --stock-button-hover-bg: rgba(66,153,225,0.08);
      --stock-button-hover-border: #4fc3f7;

      --turn-bg: #0f1724;
      --turn-text: #e6eef8;
      --turn-ai-bg: #0b3a63;
      --turn-ai-text: #ffffff;
      --game-status-text: #a8b3c7;

      --unplayable-bg: rgba(220, 53, 69, 0.06);

      --winner-gold: #ffd54a;
      --winner-silver: #bfc7d6;
      --winner-bronze: #b86f3c;
      --score-rank1-bg: linear-gradient(135deg, #ffd54a 0%, #ffea85 100%);
      --score-rank2-bg: linear-gradient(135deg, #bfc7d6 0%, #d6dce6 100%);
    }

    /* Retro Theme */
    [data-theme="retro"] {
      --bg-primary: #c4cfa1;
      --bg-secondary: #d4deb2;
      --bg-tertiary: #e4eec2;
      --text-primary: #2d3319;
      --text-secondary: #4a5528;
      --text-muted: #6b7a3a;
      --accent-primary: #8b4513;
      --accent-secondary: #228b22;
      --accent-warning: #daa520;
      --accent-danger: #b22222;
      --border-color: #9aab71;
      --shadow-color: rgba(45,51,25,0.2);
      --panel-bg: #d4deb2;
      --cell-bg: #e4eec2;
      --cell-border: #9aab71;
      --neutral-tile: linear-gradient(135deg, #6b7a3a 0%, #4a5528 100%);
      --header-bg: #9aab71;
      --modal-overlay: rgba(45,51,25,0.6);

      /* retro overrides (inherit defaults where fine) */
    }

    /* Ocean Theme */
    [data-theme="ocean"] {
      --bg-primary: #e0f7fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #b2ebf2;
      --text-primary: #004d5a;
      --text-secondary: #00838f;
      --text-muted: #4db6c4;
      --accent-primary: #0097a7;
      --accent-secondary: #26a69a;
      --accent-warning: #ff8a65;
      --accent-danger: #ef5350;
      --border-color: #80deea;
      --shadow-color: rgba(0,77,90,0.15);
      --panel-bg: #ffffff;
      --cell-bg: #e0f7fa;
      --cell-border: #80deea;
      --neutral-tile: linear-gradient(135deg, #00838f 0%, #006978 100%);
      --header-bg: #b2ebf2;
      --modal-overlay: rgba(0,77,90,0.5);
    }

    /* Sunset Theme */
    [data-theme="sunset"] {
      --bg-primary: #fff5f5;
      --bg-secondary: #ffffff;
      --bg-tertiary: #ffe4e1;
      --text-primary: #4a1a1a;
      --text-secondary: #8b4545;
      --text-muted: #bc7070;
      --accent-primary: #e65100;
      --accent-secondary: #ff7043;
      --accent-warning: #ffa726;
      --accent-danger: #d32f2f;
      --border-color: #ffccbc;
      --shadow-color: rgba(74,26,26,0.15);
      --panel-bg: #ffffff;
      --cell-bg: #fff5f5;
      --cell-border: #ffccbc;
      --neutral-tile: linear-gradient(135deg, #e65100 0%, #bf360c 100%);
      --header-bg: #ffe4e1;
      --modal-overlay: rgba(74,26,26,0.5);
    }

    /* High Contrast Theme */
    [data-theme="contrast"] {
      --bg-primary: #000000;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #333333;
      --text-primary: #ffffff;
      --text-secondary: #ffff00;
      --text-muted: #cccccc;
      --accent-primary: #00ffff;
      --accent-secondary: #00ff00;
      --accent-warning: #ffff00;
      --accent-danger: #ff0000;
      --border-color: #ffffff;
      --shadow-color: rgba(255,255,255,0.2);
      --panel-bg: #1a1a1a;
      --cell-bg: #333333;
      --cell-border: #ffffff;
      --neutral-tile: linear-gradient(135deg, #666666 0%, #444444 100%);
      --header-bg: #333333;
      --modal-overlay: rgba(0,0,0,0.8);

      --banner-text: #ffffff;
      --banner-bg: linear-gradient(135deg,#444 0%,#222 100%);
      --banner-close-bg: rgba(255,255,255,0.12);

      --neutral-tile-text: #ffffff;
      --cell-chain-color: #ffffff;

      --turn-bg: #1a1a1a;
      --turn-text: #ffffff;
      --turn-ai-bg: #00ffff;
      --turn-ai-text: #000000;

      --winner-gold: #ffd700;
      --winner-silver: #c0c0c0;
      --winner-bronze: #cd7f32;
      --score-rank1-bg: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      --score-rank2-bg: linear-gradient(135deg, #c0c0c0 0%, #d3d3d3 100%);
    }

    /* ====== BASE STYLES ====== */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      transition: background 0.3s, color 0.3s;
      /* Support for devices with notches */
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }

    html {
      scroll-behavior: smooth;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html {
      scroll-behavior: smooth;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Mobile help banner */
    .mobile-banner {
      display: none;
      background: var(--banner-bg);
      color: var(--banner-text);
      padding: 12px 16px;
      text-align: center;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      position: relative;
      z-index: 100;
    }

    .mobile-banner strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .mobile-banner .close-banner {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--banner-close-bg);
      border: none;
      color: var(--banner-text);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    @media screen and (max-width: 768px) {
      .mobile-banner {
        display: block;
      }
    }
    
    /* ====== RESPONSIVE LAYOUT FOR iPAD ====== */
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      gap: 16px;
      margin: 0;
      padding: 12px;
      max-width: 100vw;
      overflow-x: hidden;
    }

    .leftPane, .middlePane, .rightPane {
      min-width: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* iPad Landscape (1024px+) - Primary target */
    @media screen and (min-width: 1024px) and (orientation: landscape) {
      .layout {
        grid-template-columns: 1.4fr 1fr;
        grid-template-rows: auto auto;
        gap: 16px;
        padding: 12px;
      }
      
      .leftPane {
        grid-column: 1;
        grid-row: 1 / 3;
      }
      
      .middlePane {
        grid-column: 2;
        grid-row: 1;
      }
      
      .rightPane {
        grid-column: 2;
        grid-row: 2;
      }
    }

    /* iPad Pro 12.9" Landscape (1366px+) */
    @media screen and (min-width: 1366px) and (orientation: landscape) {
      .layout {
        grid-template-columns: 1.8fr 1fr 0.9fr;
        grid-template-rows: auto;
        gap: 20px;
        padding: 16px;
        max-width: 1600px;
        margin: 0 auto;
      }
      
      .leftPane {
        grid-column: 1;
        grid-row: 1;
      }
      
      .middlePane {
        grid-column: 2;
        grid-row: 1;
      }
      
      .rightPane {
        grid-column: 3;
        grid-row: 1;
      }
    }
    /* ====== RESPONSIVE PANELS ====== */
    .panel {
      background: var(--panel-bg);
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 8px var(--shadow-color);
      margin-bottom: 0;
      border: 1px solid var(--border-color);
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--text-primary);
      font-weight: 600;
    }

    @media screen and (min-width: 1024px) {
      .panel {
        padding: 14px;
      }
      
      .panel h2 {
        font-size: 18px;
      }
    }
    
    /* Compact layout for 14" laptops (around 1366x768 or 1920x1080 scaled) */
    @media screen and (min-width: 1024px) and (max-height: 800px) {
      .layout {
        gap: 10px;
        padding: 8px;
      }
      
      .panel {
        padding: 10px;
      }
      
      .panel h2 {
        margin: 0 0 6px;
        font-size: 15px;
      }
      
      .header-row {
        margin-bottom: 8px !important;
      }
      
      #gameLog {
        max-height: 160px;
        overflow-y: auto;
      }
      
      #logMessages {
        max-height: 120px;
      }
      
      #stockPanel {
        max-height: 400px;
        overflow-y: auto;
      }
    }

    /* ====== RESPONSIVE BOARD ====== */
    #board {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(9, 1fr);
      gap: 2px;
      margin-bottom: 0;
      background: var(--border-color);
      border-radius: 8px;
      width: 100%;
      max-width: 100%;
      aspect-ratio: 12 / 9;
      padding: 3px;
      box-sizing: border-box;
    }

    /* iPad Portrait - smaller cells */
    @media screen and (max-width: 1023px) and (orientation: portrait) {
      #board {
        gap: 1px;
        padding: 2px;
      }
    }

    /* iPad Landscape - optimal size */
    @media screen and (min-width: 1024px) and (orientation: landscape) {
      #board {
        max-width: 650px;
      }
    }
    
    /* Compact for laptops with limited height */
    @media screen and (min-width: 1024px) and (max-height: 800px) {
      #board {
        max-width: 580px;
      }
    }

    /* iPad Pro 12.9" - larger board */
    @media screen and (min-width: 1366px) and (orientation: landscape) and (min-height: 900px) {
      #board {
        max-width: 800px;
      }
    }
    .welcome-message {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      font-size: 20px;
      color: var(--text-muted);
      font-weight: 600;
      text-align: center;
      line-height: 1.5;
      padding: 20px;
    }
    
    .cell {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      background: var(--cell-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(10px, 2vw, 14px);
      cursor: pointer;
      transition: 0.15s ease;
      color: var(--text-muted);
      font-weight: 600;
      border: 1px solid var(--cell-border);
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }

    /* Touch-friendly hover effects */
    @media (hover: hover) {
      .cell:hover:not(.cell-occupied) {
        filter: brightness(95%);
        transform: scale(1.05);
      }
    }

    /* Touch feedback */
    .cell:active:not(.cell-occupied) {
      transform: scale(0.95);
      filter: brightness(90%);
    }
    .cell.faded {
      opacity: 0;
      animation: tileFade 0.22s ease-out forwards;
    }
    @keyframes tileFade {
      to { opacity: 1; }
    }
    .cell-neutral {
      background: var(--neutral-tile-bg);
      color: var(--neutral-tile-text);
      font-weight: bold;
      box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.3);
      border: 2px solid var(--neutral-tile-border);
    }
    .cell-chain {
      color: var(--cell-chain-color);
      font-weight: bold;
      box-shadow: 0 0 8px rgba(0,0,0,0.35), inset 0 0 6px rgba(0,0,0,0.25);
    }
    .cell-occupied {
      cursor: not-allowed;
    }

    /* Hover previews */
    .cell.preview-legal {
      outline: 3px solid var(--preview-legal);
      outline-offset: -3px;
    }
    .cell.preview-illegal {
      outline: 3px solid var(--preview-illegal);
      outline-offset: -3px;
      cursor: not-allowed;
    }
    .cell.preview-merger {
      outline: 3px dashed var(--preview-merger);
      outline-offset: -3px;
    }
    .cell.preview-new-chain {
      outline: 3px dashed var(--preview-new-chain);
      outline-offset: -3px;
    }
    .cell.player-tile {
      box-shadow: 0 0 0 3px var(--player-tile-ring), 0 0 12px var(--player-tile-ring-glow);
      animation: pulse 2s ease-in-out infinite;
      cursor: pointer;
    }
    .cell.player-tile:hover {
      transform: scale(1.08);
      box-shadow: 0 0 0 4px var(--player-tile-ring-hover), 0 0 16px var(--player-tile-glow-hover);
    }
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 3px var(--player-tile-ring), 0 0 12px var(--player-tile-ring-glow);
      }
    }

    /* ====== TOUCH-OPTIMIZED BUTTONS ====== */
    button {
      min-height: 44px;
      min-width: 44px;
      padding: 10px 16px;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    button:active {
      transform: scale(0.96);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (hover: hover) {
      button:hover:not(:disabled) {
        background: var(--bg-tertiary);
        transform: translateY(-1px);
        box-shadow: 0 2px 8px var(--shadow-color);
      }
    }

    button.primary {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    /* ====== RESPONSIVE RACK ====== */
    .rack-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    @media screen and (max-width: 600px) {
      .rack-container {
        flex-direction: column;
        align-items: stretch;
      }
    }

    #rack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex: 1;
      min-height: 44px;
    }

    #rack button {
      min-width: 60px;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--cell-bg);
      border: 2px solid var(--border-color);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #rack button.selected {
      border-color: var(--accent-primary);
      background: var(--accent-primary);
      color: white;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.2);
    }

    @media (hover: hover) {
      #rack button:hover:not(.unplayable) {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px var(--shadow-color);
      }
    }

    #rack button:active:not(.unplayable) {
      transform: scale(0.95);
    }

    #rack button.unplayable {
      opacity: 0.4;
      cursor: not-allowed;
      background: var(--unplayable-bg);
      border-color: var(--accent-danger);
    }

    #controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media screen and (max-width: 600px) {
      #controls {
        width: 100%;
      }
      
      #controls button {
        flex: 1;
      }
    }

    #newGameBtn {
      background: var(--accent-warning);
      color: white;
      border-color: var(--accent-warning);
      font-weight: 600;
      padding: 12px 24px;
    }

    #undoBtn {
      background: var(--accent-danger);
      color: white;
      border-color: var(--accent-danger);
    }

    #endTurnBtn {
      background: var(--accent-secondary);
      color: white;
      border-color: var(--accent-secondary);
      font-weight: 600;
    }

    /* PLAYERS */
    #playersList .playerCard {
      padding: 10px 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      background: var(--bg-tertiary);
      box-shadow: 0 1px 3px var(--shadow-color);
      font-size: 14px;
      transition: 0.2s ease;
      border: 1px solid var(--border-color);
    }
    #playersList .playerCard.active {
      background: var(--bg-secondary);
      border: 2px solid var(--accent-primary);
      box-shadow: 0 0 12px rgba(33,150,243,0.5);
      transform: scale(1.02);
    }
    .playerCard .player-name {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .playerCard .player-money {
      color: var(--accent-secondary);
      font-weight: 600;
    }
    .playerCard .player-shares {
      font-size: 12px;
      margin-top: 4px;
      color: var(--text-secondary);
    }

    /* STOCK PANEL */
    #stockPanel h2 {
      margin-top: 0;
      font-size: 18px;
      text-align: center;
    }
    
    /* Available Companies Indicator */
    .available-companies {
      display: flex;
      flex-wrap: wrap;
